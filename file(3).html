<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - CineVerse</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    .auth-box {
      background: rgba(17,17,24,0.9);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      position: relative;
      overflow: hidden;
    }
    .auth-box::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(229,9,20,0.15), transparent);
      pointer-events: none;
    }
    .auth-logo {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    .auth-logo span { color: var(--primary); }
    .auth-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; }
    .auth-tabs {
      display: flex;
      background: var(--dark-2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.7rem;
      border-radius: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-muted);
      background: transparent;
      transition: var(--transition);
    }
    .auth-tab.active {
      background: var(--primary);
      color: white;
    }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }
    .form-group .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .form-group .input-icon {
      position: absolute;
      left: 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      background: var(--dark-2);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      border-radius: 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      transition: var(--transition);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
    }
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), #ff4444);
      color: white;
      padding: 1rem;
      border-radius: 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      transition: var(--transition);
      box-shadow: 0 8px 30px rgba(229,9,20,0.3);
      margin-bottom: 1rem;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-red); }
    .or-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }
    .social-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      padding: 0.9rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: white;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      transition: var(--transition);
      margin-bottom: 0.8rem;
    }
    .social-btn:hover { border-color: var(--secondary); background: rgba(0,210,255,0.05); }
    .social-btn.google i { color: #ea4335; }
    .forgot-link {
      display: block;
      text-align: right;
      color: var(--secondary);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      cursor: pointer;
    }
    .register-form { display: none; }
    .back-home {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .back-home a { color: var(--secondary); }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">CINE<span>VERSE</span></div>
    <div class="auth-subtitle">Your Cinema Universe Awaits</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <div class="input-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="loginEmail" placeholder="your@email.com" required />
        </div>
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <a class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="submit-btn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
      <div class="or-divider">OR</div>
      <button type="button" class="social-btn google" onclick="googleSignIn()">
        <i class="fab fa-google"></i> Continue with Google
      </button>
      <button type="button" class="social-btn" onclick="facebookSignIn()">
        <i class="fab fa-facebook" style="color:#1877f2"></i> Continue with Facebook
      </button>
    </form>

    <!-- Register Form -->
    <form class="register-form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>FULL NAME</label>
        <div class="input-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="regName" placeholder="John Doe" required />
        </div>
      </div>
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <div class="input-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="regEmail" placeholder="your@email.com" required />
        </div>
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="regPassword" placeholder="••••••••" required minlength="8" />
        </div>
      </div>
      <button type="submit" class="submit-btn">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
      <div class="or-divider">OR</div>
      <button type="button" class="social-btn google" onclick="googleSignIn()">
        <i class="fab fa-google"></i> Sign up with Google
      </button>
    </form>

    <div class="back-home"><a href="index.html">← Back to Home</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
}
function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  // Demo: save to localStorage
  localStorage.setItem('user', JSON.stringify({ email, name: email.split('@')[0], loggedIn: true }));
  showToast('✅ Welcome back!', 'success');
  setTimeout(() => window.location.href = 'index.html', 1500);
}
function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  localStorage.setItem('user', JSON.stringify({ email, name, loggedIn: true }));
  showToast('🎉 Account created! Welcome!', 'success');
  setTimeout(() => window.location.href = 'index.html', 1500);
}
function googleSignIn() {
  showToast('🔐 Redirecting to Google...', 'success');
  setTimeout(() => {
    localStorage.setItem('user', JSON.stringify({ email: 'demo@gmail.com', name: 'Demo User', loggedIn: true }));
    window.location.href = 'index.html';
  }, 1500);
}
function facebookSignIn() {
  showToast('🔐 Redirecting to Facebook...', 'success');
  setTimeout(() => window.location.href = 'index.html', 1500);
}
function showToast(msg, type) {
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Simple particle init without Three.js dependency for login page
const canvas = document.getElementById('bg-canvas');
if (canvas) {
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = Array.from({length: 100}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 0.5,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5,
    color: Math.random() > 0.7 ? '#e50914' : '#00d2ff'
  }));
  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.6;
      ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
}
</script>
</body>
</html>
