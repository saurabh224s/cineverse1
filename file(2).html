<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch - CineVerse</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    .player-page { padding-top: 70px; min-height: 100vh; }
    .player-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .player-grid { display: grid; grid-template-columns: 1fr 350px; gap: 2rem; }
    .player-main { flex: 1; }
    .player-wrapper {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 60px rgba(229,9,20,0.15);
      border: 1px solid rgba(229,9,20,0.2);
    }
    .video-container {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
    }
    #mainPlayer {
      width: 100%;
      height: 100%;
      border: none;
    }
    .player-info { margin-top: 1.5rem; }
    .player-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .player-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .player-meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.9rem;
    }
    .player-meta .rating { color: var(--accent); font-weight: 700; }
    .quality-badge {
      background: var(--secondary);
      color: var(--dark);
      padding: 0.2rem 0.7rem;
      border-radius: 4px;
      font-weight: 800;
      font-size: 0.8rem;
    }
    .player-btns {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .player-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      transition: var(--transition);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: white;
    }
    .player-btn:hover { background: var(--primary); border-color: var(--primary); transform: translateY(-2px); }
    .player-btn.active { background: var(--primary); border-color: var(--primary); }
    .player-desc {
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }
    /* Sidebar */
    .player-sidebar {}
    .sidebar-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--secondary);
    }
    .related-list { display: flex; flex-direction: column; gap: 1rem; }
    .related-card {
      display: flex;
      gap: 1rem;
      background: var(--dark-2);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid var(--glass-border);
    }
    .related-card:hover { border-color: var(--primary); transform: translateX(5px); }
    .related-card img {
      width: 90px;
      height: 60px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .related-info { padding: 0.7rem; flex: 1; }
    .related-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .related-meta { font-size: 0.75rem; color: var(--text-muted); }
    .related-rating { color: var(--accent); }
    /* Server tabs */
    .server-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .server-tab {
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: white;
    }
    .server-tab.active { background: var(--primary); border-color: var(--primary); }
    /* Comments */
    .comments-section { margin-top: 2rem; }
    .comment-input-box {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .comment-input-box input {
      flex: 1;
      background: var(--dark-2);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
    }
    .comment-input-box button {
      background: var(--primary);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
    }
    .comments-list { display: flex; flex-direction: column; gap: 1rem; }
    .comment-item {
      background: var(--dark-2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem;
    }
    .comment-author { font-weight: 700; color: var(--secondary); margin-bottom: 0.3rem; }
    .comment-text { color: var(--text-muted); font-size: 0.9rem; }
    @media (max-width: 1024px) {
      .player-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-logo"><a href="index.html">CINE<span>VERSE</span></a></div>
  <div class="nav-links" id="navLinks">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="movies.html"><i class="fas fa-film"></i> Movies</a>
    <a href="tv.html"><i class="fas fa-tv"></i> TV Shows</a>
    <a href="tv.html#live"><i class="fas fa-circle live-dot"></i> Live TV</a>
  </div>
  <div class="nav-right">
    <div class="search-box">
      <input type="text" id="navSearch" placeholder="Search..." />
      <button onclick="performSearch()"><i class="fas fa-search"></i></button>
    </div>
    <a href="login.html" class="btn-login"><i class="fas fa-user"></i> Sign In</a>
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
  </div>
</nav>

<div class="player-page" id="playerPage">
  <div class="player-container">
    <div id="loadingPlayer" style="text-align:center;padding:4rem;font-size:1.5rem;">
      <i class="fas fa-spinner fa-spin" style="color:var(--primary);font-size:3rem;"></i>
      <p style="margin-top:1rem;color:var(--text-muted);">Loading player...</p>
    </div>
    <div id="playerContent" style="display:none;">
      <div class="player-grid">
        <div class="player-main">
          <!-- Server Selection -->
          <div class="server-tabs" id="serverTabs"></div>
          <!-- Video Player -->
          <div class="player-wrapper">
            <div class="video-container">
              <iframe id="mainPlayer" src="" allowfullscreen
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen">
              </iframe>
            </div>
          </div>
          <!-- Movie Info -->
          <div class="player-info">
            <h1 class="player-title" id="playerTitle">Loading...</h1>
            <div class="player-meta">
              <span class="rating"><i class="fas fa-star"></i> <span id="playerRating">0.0</span></span>
              <span id="playerYear"></span>
              <span id="playerRuntime"></span>
              <span class="quality-badge">HD</span>
              <span id="playerGenres"></span>
            </div>
            <div class="player-btns">
              <button class="player-btn" onclick="addToWatchlist()">
                <i class="fas fa-plus"></i> Watchlist
              </button>
              <button class="player-btn" onclick="shareMovie()">
                <i class="fas fa-share"></i> Share
              </button>
              <button class="player-btn" onclick="downloadMovie()">
                <i class="fas fa-download"></i> Download
              </button>
            </div>
            <p class="player-desc" id="playerDesc">Loading...</p>
          </div>
          <!-- Comments -->
          <div class="comments-section">
            <h3 style="font-family:'Orbitron',sans-serif;margin-bottom:1rem;">💬 Comments</h3>
            <div class="comment-input-box">
              <input type="text" id="commentInput" placeholder="Write a comment..." />
              <button onclick="postComment()">Post</button>
            </div>
            <div class="comments-list" id="commentsList">
              <div class="comment-item">
                <div class="comment-author">MovieFan99</div>
                <div class="comment-text">Amazing movie! Must watch 🔥</div>
              </div>
              <div class="comment-item">
                <div class="comment-author">CineBuff</div>
                <div class="comment-text">One of the best films of the year!</div>
              </div>
            </div>
          </div>
        </div>
        <!-- Sidebar -->
        <div class="player-sidebar">
          <div class="sidebar-title">You Might Also Like</div>
          <div class="related-list" id="relatedList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="player.js"></script>
</body>
</html>
